name: Generate GitHub Snake
on:
  schedule:
    - cron: "0 0 * * *"  # 每天 0 点自动更新
  workflow_dispatch:    # 允许手动点一下运行

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            github-snake.svg
            github-snake-dark.svg?palette=github-dark

      - name: Commit to repo
        uses: EndBug/add-and-commit@v9
        with:
          message: "Update snake animation"
          add: "github-snake*.svg"

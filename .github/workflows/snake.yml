name: All Custom Color Snake
on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Generate All Custom Snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/white-base.svg?palette=github-light&color_snake=#2563eb
            dist/dark-base.svg?palette=github-dark&color_snake=#38bdf8
            dist/ocean-blue.svg?palette=ocean&color_snake=#06b6d4
            dist/pink-girl.svg?palette=pink&color_snake=#ec4899
            dist/hall-orange.svg?palette=halloween&color_snake=#f97316
            dist/neon-cyber.svg?palette=high-contrast&color_snake=#00ffff
            dist/gold-luxury.svg?palette=github-dark&color_snake=#fbbf24

      - name: Push All To Output
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

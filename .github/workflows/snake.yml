name: All Theme GitHub Snake
on:
  workflow_dispatch:
  schedule:
    cron: "0 0 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Generate ALL themes snake svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/light.svg?palette=github-light
            dist/dark.svg?palette=github-dark
            dist/ocean.svg?palette=ocean
            dist/pink.svg?palette=pink
            dist/halloween.svg?palette=halloween
            dist/contrast.svg?palette=high-contrast
            dist/neon.svg?color_snake=#00ffff&color_dots=#ff00ff,#00ffff,#ffff00

      - name: Push all images to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Snake Contribution Grid Animation
on:
  schedule:
    cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake SVG
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: xiaozhang-qd
          outputs: |
            snake.svg
            snake-dark.svg?palette=github-dark

      - name: Commit & Push
        uses: EndBug/add-and-commit@v9
        with:
          default_author: github_actions
          message: Update snake svg
